<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
        <img src="spotify-48.png" alt="Spotify-logo">
        </div>

        <h1>Log in to Spotify</h1>

        <div class="buttons">
            <button class="social-btn google-btn">Continue with Google</button>
            <button class="social-btn facebook-btn">Continue with Facebook</button>
            <button class="social-btn apple-btn">Continue with Apple</button>
            <button class="social-btn phone-btw">Continue with phone number</button>
        </div>

        <div class="login">
            <h2>Email or username</h2>
            <input type="text" placeholder="Email or username">
            <h2>Password</h2>
            <input type="text" placeholder="Password">
        </div>

        <button class="login-btn">Log in</button>

        <div class="helpers">
            <a href="#" class="forgot-password">Forgot your password?</a>
            
            <div class="signup-section">
                <span>Dont have an account?</span>
                <a href="#" class="signup-link">Sign up for Spotify</a>
            </div>
        </div>

    </div>
</body>
</html>
